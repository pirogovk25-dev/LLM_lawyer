services:
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    deploy:
      resources:
        limits:
          memory: 4G

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: legal-rag-backend
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant_db
      - QDRANT_PORT=6333
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - qdrant_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal-rag-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped

  llm-server:
    image: ghcr.io/ggerganov/llama.cpp:full-cuda
    container_name: llama-api
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    restart: unless-stopped
    profiles:
      - local-llm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model /models/Qwen1.5-MoE-A2.7B-Chat.Q4_K_M.gguf
      --ctx-size 16384
      --n-gpu-layers 99
      --host 0.0.0.0
      --port 8080
      --slot-save-path /models/slots
