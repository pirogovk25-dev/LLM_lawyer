version: '3.8'

services:
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      # Лимиты, чтобы база не сожрала всю память WSL2
    deploy:
      resources:
        limits:
          memory: 4G